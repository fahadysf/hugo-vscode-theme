{{ define "main" }}
<div class="tabs">
  <div class="tab active">📄 {{ .Title }}.md</div>
</div>
<div class="editor">
  <div class="editor-content">
    <div class="breadcrumb"><span>taxonomies</span> > <span>{{ .Title }}.md</span></div>
    <h1>{{ .Title }}</h1>
    <p>{{ .Data.Plural | humanize }} available on this site.</p>
    <ul class="taxonomy-list">
      {{ range .Data.Terms.Alphabetical }}
      <li><a href="{{ .Page.RelPermalink }}">{{ .Page.Title }} <span class="meta">({{ .Count }})</span></a></li>
      {{ end }}
    </ul>
  </div>
</div>
{{ end }}
