<footer class="app-status">
  <div class="left">
    <span>🌿 master*</span>
    <span>UTF-8</span>
    <span>Markdown</span>
  </div>
  <div class="right">
    <label for="font-select">Font:</label>
    <select id="font-select" x-model="fontFamily" @change="setFont(fontFamily)">
      <option>JetBrains Mono</option>
      <option>Fira Code</option>
      <option>Inter</option>
      <option>Roboto Mono</option>
    </select>
    <span>Ln {{ .WordCount | default 1 }}, Col 1</span>
    <a href="https://github.com/fahadysf/hugo-vscode-theme" target="_blank" rel="noopener">GitHub</a>
  </div>
</footer>
