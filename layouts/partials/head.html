<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ .Site.Params.description | default .Summary | default .Site.Title }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Inter:wght@100..900&family=JetBrains+Mono:wght@100..800&family=Roboto+Mono:wght@100..700&display=swap" rel="stylesheet">
{{ $css := resources.Get "css/main.css" | minify | fingerprint }}
<link rel="stylesheet" href="{{ $css.RelPermalink }}">
{{ range .Site.Params.customCSS }}
{{ $custom := resources.Get . }}
{{ if $custom }}
{{ $customCSS := $custom | minify | fingerprint }}
<link rel="stylesheet" href="{{ $customCSS.RelPermalink }}">
{{ end }}
{{ end }}
<script>
  (function(){
    function getCookie(n){var v=document.cookie.match('(^|;)\\s*'+n+'\\s*=\\s*([^;]+)');return v?v.pop():'';}
    var font=getCookie('hugo_vscode_font')||'Inter';
    document.documentElement.style.setProperty('--font-family',"'"+font+"', monospace");
  })();
</script>
