{{ define "main" }}
<div class="tabs">
  <div class="tab active">📄 Tags.md</div>
</div>
<div class="editor">
  <div class="editor-content">
    <div class="breadcrumb"><span>taxonomies</span> > <span>Tags.md</span></div>
    <h1>Tags</h1>
    <ul class="taxonomy-list">
      {{ range .Data.Terms.Alphabetical }}
      <li><a href="{{ .Page.RelPermalink }}">{{ .Page.Title }} <span class="meta">({{ .Count }})</span></a></li>
      {{ end }}
    </ul>
  </div>
</div>
{{ end }}
